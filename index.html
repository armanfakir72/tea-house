<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Hoiuse</title>

    <!-- taliwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />


</head>

<body>
    <!-- banner section -->
    <section class="grid grid-cols-1 md:grid-cols-2 items-center container mx-auto">
        <div class="banner-left space-y-[30px]">
            <h2 class="text-[80px] font-bold">It's good <br> tea time at The <br> Tea House</h2>
            <p class="text-[#777777] text-lg">Tea and Botanical Solutions Supplier Give Optimum <br> Satisfaction To Your Taste Buds.</p>
            <button class="py-3 px-4 bg-linear-to-r from-[#ff8938] to-[#ff0000] text-white">Explore More <span class="inline-block -rotate-45"><i class="fa-solid fa-arrow-right"></i></span></button>
        </div>
        <div class="banner-right flex justify-end items-end relative">
            <img src="./images/banner.png" alt="">
            <!-- rating div -->
            <div class="flex justify-center gap-2 items-center absolute py-[25px] px-[25px] rounded-2xl bg-white shadow-2xl bottom-[35px] left-[200px] w-[250px]">
                <img src="./images/rating.png" alt="">
                <div>
                    <h2 class="font-bold">5.00</h2>
                    <p class="text-sm text-[#777777]">Trust Pilot Ratings</p>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
